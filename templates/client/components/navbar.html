{% load static%}
<nav class="bg-blue-600 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">

                <div class="flex items-center relative">
                    <button id="profileBtn" class="flex items-center space-x-3 focus:outline-none">
                    <span class="text-white text-sm hidden sm:block">{% if user.is_authenticated%} Halo, {{user.username}} {%else %} anda belum login{%endif%}</span>
                        <div class="h-8 w-8 rounded-full bg-blue-300 hover:bg-blue-200 transition-colors flex items-center justify-center text-blue-800 font-bold">

                    <div id="dropdownMenu" class="hidden absolute right-0 top-12 mt-2 w-48 bg-white rounded-md shadow-lg py-1 border border-gray-200 z-50">

                    <form method="POST" action="{% url 'logout'%}">
                        {% csrf_token%}
